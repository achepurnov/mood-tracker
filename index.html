<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mood tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #e0e0e0;
  }
  .container {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 40px;
    max-width: 600px;
    width: 100%;
    margin: 20px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.08);
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }
  .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 32px;
  }
  .moods {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 24px;
  }
  .mood-btn {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    border: 2px solid transparent;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.06);
  }
  .mood-btn:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.12);
  }
  .mood-btn.selected {
    border-color: #fff;
    background: rgba(255,255,255,0.15);
    transform: scale(1.15);
    box-shadow: 0 0 20px rgba(255,255,255,0.15);
  }
  .mood-btn[data-mood="1"] { --m: #ef4444; }
  .mood-btn[data-mood="2"] { --m: #f97316; }
  .mood-btn[data-mood="3"] { --m: #eab308; }
  .mood-btn[data-mood="4"] { --m: #22c55e; }
  .mood-btn[data-mood="5"] { --m: #8b5cf6; }
  .mood-btn.selected { border-color: var(--m); box-shadow: 0 0 20px color-mix(in srgb, var(--m) 40%, transparent); }
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 70px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  textarea:focus { border-color: rgba(255,255,255,0.3); }
  textarea::placeholder { color: rgba(255,255,255,0.3); }
  .save-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    color: #e0e0e0;
    transition: all 0.2s;
    margin-bottom: 36px;
  }
  .save-btn:hover { background: rgba(255,255,255,0.18); }
  .save-btn:active { transform: scale(0.98); }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 16px;
  }
  .chart {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    min-height: 60px;
    padding-bottom: 20px;
    position: relative;
    overflow-x: auto;
  }
  .day {
    flex: 1;
    min-width: 12px;
    border-radius: 4px 4px 0 0;
    position: relative;
    cursor: pointer;
    transition: opacity 0.2s;
    height: var(--h, 20px);
  }
  .day:hover {
    opacity: 0.7;
  }
  .day.empty {
    background: rgba(255,255,255,0.06);
    height: 8px;
    border-radius: 4px;
    cursor: default;
  }
  .day .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    white-space: nowrap;
    z-index: 10;
    backdrop-filter: blur(10px);
  }
  .day:hover .tooltip { display: block; }
  .empty-state {
    text-align: center;
    color: rgba(255,255,255,0.25);
    font-size: 14px;
    padding: 20px 0;
  }
  .saved-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 1px solid rgba(255,255,255,0.08);
    pointer-events: none;
  }
  .saved-toast.show { transform: translateX(-50%) translateY(0); }
  .stats { margin-top: 36px; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 600;
  }
  .dist-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 10px;
  }
  .distribution {
    display: flex;
    gap: 6px;
  }
  .dist-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .dist-bar {
    width: 100%;
    border-radius: 4px;
    min-height: 4px;
    transition: height 0.4s ease;
    position: relative;
  }
  .dist-count {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
  }
  .dist-emoji {
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>mood tracker</h1>
  <p class="subtitle">как прошёл твой день?</p>

  <div class="moods">
    <button class="mood-btn" data-mood="1" title="ужасно">😡</button>
    <button class="mood-btn" data-mood="2" title="плохо">😢</button>
    <button class="mood-btn" data-mood="3" title="нормально">😐</button>
    <button class="mood-btn" data-mood="4" title="хорошо">😊</button>
    <button class="mood-btn" data-mood="5" title="отлично">🤩</button>
  </div>

  <textarea id="note" placeholder="заметка (не обязательно)"></textarea>
  <button class="save-btn" id="saveBtn">✎ сохранить</button>

  <div class="section-title">последние 30 дней</div>
  <div class="chart" id="chart"></div>
  <div id="emptyState" class="empty-state">тут пока пусто. отметь своё настроение!</div>

  <div class="stats" id="stats" style="display:none">
    <div class="section-title">статистика</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">среднее за 7 дней</div>
        <div class="stat-value" id="avg7">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">среднее за всё время</div>
        <div class="stat-value" id="avgAll">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">любимый день недели</div>
        <div class="stat-value" id="bestDay">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">cтрик (дней подряд)</div>
        <div class="stat-value" id="streak">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">чаще всего</div>
        <div class="stat-value" id="topMood">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">всего отметок</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
    </div>
    <div class="dist-title">распределение</div>
    <div class="distribution" id="distribution"></div>
  </div>
</div>

<div class="saved-toast" id="toast">сохранено ✌️</div>

<script>
  const MOOD_COLORS = { 1: '#ef4444', 2: '#f97316', 3: '#eab308', 4: '#22c55e', 5: '#8b5cf6' };
  const MOOD_LABELS = { 1: 'ужасно', 2: 'плохо', 3: 'нормально', 4: 'хорошо', 5: 'отлично' };
  const STORAGE_KEY = 'moodtracker';

  let selectedMood = null;

  // init
  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedMood = parseInt(btn.dataset.mood);
    });
  });

  document.getElementById('saveBtn').addEventListener('click', saveMood);

  function saveMood() {
    if (!selectedMood) return;
    const note = document.getElementById('note').value.trim();
    const today = new Date().toISOString().slice(0, 10);
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    data[today] = { mood: selectedMood, note };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    showToast();
    renderChart();
    renderStats();
    // reset
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('note').value = '';
    selectedMood = null;
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function renderChart() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const chart = document.getElementById('chart');
    const empty = document.getElementById('emptyState');
    chart.innerHTML = '';

    const days = [];
    const now = new Date();
    for (let i = 29; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      days.push(d.toISOString().slice(0, 10));
    }

    let hasData = false;
    for (const date of days) {
      const div = document.createElement('div');
      div.className = 'day';

      const entry = data[date];
      if (entry) {
        hasData = true;
        const mood = entry.mood;
        div.style.setProperty('--h', (mood * 10 + 10) + 'px');
        div.style.background = MOOD_COLORS[mood];

        const tip = document.createElement('div');
        tip.className = 'tooltip';
        const dayLabel = new Date(date).toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'short' });
        tip.textContent = `${dayLabel} — ${MOOD_LABELS[mood]}${entry.note ? ': ' + entry.note : ''}`;
        div.appendChild(tip);
      } else {
        div.classList.add('empty');
      }
      chart.appendChild(div);
    }

    empty.style.display = hasData ? 'none' : 'block';
  }

  function renderStats() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const entries = Object.entries(data).sort((a, b) => a[0].localeCompare(b[0]));
    const stats = document.getElementById('stats');

    if (entries.length === 0) { stats.style.display = 'none'; return; }
    stats.style.display = 'block';

    const values = entries.map(([_, v]) => v.mood);

    // avg 7 days
    const last7 = values.slice(-7);
    const avg7 = last7.reduce((a, b) => a + b, 0) / last7.length;
    document.getElementById('avg7').textContent = avg7.toFixed(1) + ' (' + MOOD_LABELS[Math.round(avg7)] + ')';

    // avg all
    const avgAll = values.reduce((a, b) => a + b, 0) / values.length;
    document.getElementById('avgAll').textContent = avgAll.toFixed(1) + ' (' + MOOD_LABELS[Math.round(avgAll)] + ')';

    // best day of week
    const dayScores = {};
    for (const [date, v] of entries) {
      const d = new Date(date + 'T12:00:00');
      const day = d.toLocaleDateString('ru-RU', { weekday: 'long' });
      if (!dayScores[day]) dayScores[day] = { sum: 0, count: 0 };
      dayScores[day].sum += v.mood;
      dayScores[day].count++;
    }
    let bestDayName = '—', bestDayAvg = 0;
    for (const [day, s] of Object.entries(dayScores)) {
      const avg = s.sum / s.count;
      if (avg > bestDayAvg) { bestDayAvg = avg; bestDayName = day; }
    }
    document.getElementById('bestDay').textContent = bestDayName;

    // streak
    let streak = 0;
    const todayStr = new Date().toISOString().slice(0, 10);
    for (let i = 0; ; i++) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      if (data[key]) streak++; else break;
    }
    document.getElementById('streak').textContent = streak;

    // top mood
    const freq = {};
    for (const v of values) freq[v] = (freq[v] || 0) + 1;
    let topMood = 3, topCount = 0;
    for (const [m, c] of Object.entries(freq)) {
      if (c > topCount) { topCount = c; topMood = parseInt(m); }
    }
    const topEmojis = { 1: '😡', 2: '😢', 3: '😐', 4: '😊', 5: '🤩' };
    document.getElementById('topMood').textContent = topEmojis[topMood] + ' ' + MOOD_LABELS[topMood];

    // total
    document.getElementById('totalCount').textContent = entries.length;

    // distribution
    const distEl = document.getElementById('distribution');
    distEl.innerHTML = '';
    for (let m = 1; m <= 5; m++) {
      const count = freq[m] || 0;
      const pct = entries.length ? (count / entries.length * 100) : 0;
      const wrap = document.createElement('div');
      wrap.className = 'dist-bar-wrap';
      const emoji = document.createElement('div');
      emoji.className = 'dist-emoji';
      const topEmojis = { 1: '😡', 2: '😢', 3: '😐', 4: '😊', 5: '🤩' };
      emoji.textContent = topEmojis[m];
      const bar = document.createElement('div');
      bar.className = 'dist-bar';
      bar.style.background = MOOD_COLORS[m];
      bar.style.height = Math.max(4, pct * 1.5) + 'px';
      const countEl = document.createElement('div');
      countEl.className = 'dist-count';
      countEl.textContent = count;
      wrap.appendChild(emoji);
      wrap.appendChild(bar);
      wrap.appendChild(countEl);
      distEl.appendChild(wrap);
    }
  }

  renderChart();
  renderStats();
</script>
</body>
</html>
