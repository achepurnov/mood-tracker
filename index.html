<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mood tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: linear-gradient(145deg, #fdf6f0 0%, #f5e6d9 50%, #f0dbcc 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #3d2c2c;
  }
  .container {
    background: rgba(255,248,240,0.75);
    backdrop-filter: blur(16px);
    border-radius: 28px;
    padding: 36px 32px;
    max-width: 580px;
    width: 100%;
    margin: 20px;
    box-shadow: 0 8px 32px rgba(180, 120, 80, 0.12), 0 2px 8px rgba(180, 120, 80, 0.08);
    border: 1px solid rgba(255, 240, 225, 0.6);
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 2px;
    letter-spacing: -0.3px;
    color: #3a2a1e;
  }
  .subtitle {
    font-size: 14px;
    color: rgba(60, 40, 30, 0.45);
    margin-bottom: 10px;
  }
  .quote {
    font-size: 14px;
    font-style: italic;
    color: rgba(60, 40, 30, 0.55);
    margin-bottom: 24px;
    padding: 10px 14px;
    background: rgba(240, 215, 190, 0.3);
    border-radius: 12px;
    border-left: 3px solid rgba(200, 150, 110, 0.4);
    line-height: 1.5;
    min-height: 20px;
  }
  .moods {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 24px;
  }
  .mood-btn {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    border: 2px solid transparent;
    font-size: 26px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(240, 215, 190, 0.25);
  }
  .mood-btn:hover {
    transform: scale(1.12);
    background: rgba(240, 215, 190, 0.45);
  }
  .mood-btn.selected {
    border-color: #b58a72;
    background: rgba(240, 215, 190, 0.5);
    transform: scale(1.15);
    box-shadow: 0 4px 16px rgba(180, 120, 80, 0.2);
  }
  .mood-btn[data-mood="1"] { --m: #e07060; }
  .mood-btn[data-mood="2"] { --m: #e8945a; }
  .mood-btn[data-mood="3"] { --m: #d4a84b; }
  .mood-btn[data-mood="4"] { --m: #7fb085; }
  .mood-btn[data-mood="5"] { --m: #b58ace; }
  .mood-btn.selected { border-color: var(--m); box-shadow: 0 4px 16px color-mix(in srgb, var(--m) 35%, transparent); }
  textarea {
    width: 100%;
    background: rgba(240, 215, 190, 0.2);
    border: 1px solid rgba(200, 160, 130, 0.2);
    border-radius: 12px;
    padding: 12px 14px;
    color: #3d2c2c;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 68px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }
  textarea:focus { border-color: rgba(180, 140, 110, 0.4); }
  textarea::placeholder { color: rgba(100, 75, 60, 0.3); }
  .save-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: #3d2c2c;
    color: #faf0e8;
    transition: all 0.2s;
    margin-bottom: 32px;
  }
  .save-btn:hover { background: #4d3838; transform: translateY(-1px); }
  .save-btn:active { transform: scale(0.97); }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(80, 60, 45, 0.35);
    margin-bottom: 14px;
  }
  .chart {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    min-height: 50px;
    padding-bottom: 16px;
    overflow-x: auto;
  }
  .day {
    flex: 1;
    min-width: 12px;
    border-radius: 4px 4px 0 0;
    cursor: pointer;
    transition: opacity 0.15s;
    height: var(--h, 20px);
  }
  .day:hover {
    opacity: 0.65;
  }
  .day.empty {
    background: rgba(200, 160, 130, 0.12);
    height: 6px;
    border-radius: 3px;
    cursor: default;
  }
  .empty-state {
    text-align: center;
    color: rgba(80, 60, 45, 0.3);
    font-size: 14px;
    padding: 16px 0;
  }
  .saved-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(61, 44, 44, 0.9);
    backdrop-filter: blur(12px);
    padding: 10px 22px;
    border-radius: 14px;
    font-size: 14px;
    color: #faf0e8;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  .saved-toast.show { transform: translateX(-50%) translateY(0); }
  .stats { margin-top: 32px; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 18px;
  }
  .stat-card {
    background: rgba(240, 215, 190, 0.25);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: rgba(80, 60, 45, 0.4);
    margin-bottom: 3px;
  }
  .stat-value {
    font-size: 17px;
    font-weight: 600;
    color: #3d2c2c;
  }
  .dist-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: rgba(80, 60, 45, 0.4);
    margin-bottom: 8px;
  }
  .distribution {
    display: flex;
    gap: 6px;
  }
  .dist-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .dist-bar {
    width: 100%;
    border-radius: 4px;
    min-height: 4px;
    transition: height 0.4s ease;
  }
  .dist-count {
    font-size: 11px;
    font-weight: 600;
    color: rgba(80, 60, 45, 0.45);
  }
  .dist-emoji {
    font-size: 15px;
  }
  .history { margin-top: 32px; }
  .entry {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(200, 160, 130, 0.15);
  }
  .entry:last-child { border-bottom: none; }
  .entry-date {
    font-size: 12px;
    color: rgba(80, 60, 45, 0.45);
    min-width: 38px;
  }
  .entry-mood {
    font-size: 17px;
    min-width: 26px;
    text-align: center;
  }
  .entry-label {
    font-size: 11px;
    color: rgba(80, 60, 45, 0.45);
    min-width: 52px;
  }
  .entry-note {
    flex: 1;
    font-size: 13px;
    color: rgba(80, 60, 45, 0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-del {
    background: none;
    border: none;
    color: rgba(80, 60, 45, 0.2);
    cursor: pointer;
    font-size: 15px;
    padding: 4px;
    transition: color 0.15s;
  }
  .entry-del:hover { color: #c05545; }
</style>
</head>
<body>

<div class="container">
  <h1>как дела?</h1>
  <p class="subtitle">отметь настроение и оставь заметку</p>

  <div class="quote" id="quote"></div>

  <div class="moods">
    <button class="mood-btn" data-mood="1" title="ужасно">😡</button>
    <button class="mood-btn" data-mood="2" title="плохо">😢</button>
    <button class="mood-btn" data-mood="3" title="нормально">😐</button>
    <button class="mood-btn" data-mood="4" title="хорошо">😊</button>
    <button class="mood-btn" data-mood="5" title="отлично">🤩</button>
  </div>

  <textarea id="note" placeholder="пара слов о дне..."></textarea>
  <button class="save-btn" id="saveBtn">✌️ записать</button>

  <div class="section-title">последние 30 дней</div>
  <div class="chart" id="chart"></div>
  <div id="emptyState" class="empty-state">здесь будут твои дни 🌱</div>

  <div class="stats" id="stats" style="display:none">
    <div class="section-title">статистика</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">среднее за 7 дней</div>
        <div class="stat-value" id="avg7">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">среднее за всё время</div>
        <div class="stat-value" id="avgAll">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">любимый день недели</div>
        <div class="stat-value" id="bestDay">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">cтрик (дней подряд)</div>
        <div class="stat-value" id="streak">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">чаще всего</div>
        <div class="stat-value" id="topMood">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">всего отметок</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
    </div>
    <div class="dist-title">распределение</div>
    <div class="distribution" id="distribution"></div>
  </div>

  <div class="history" id="history" style="display:none">
    <div class="section-title">последние записи</div>
    <div class="entries" id="entries"></div>
  </div>
</div>

<div class="saved-toast" id="toast">готово ✌️</div>

<script>
  const MOOD_COLORS = { 1: '#ef4444', 2: '#f97316', 3: '#eab308', 4: '#22c55e', 5: '#8b5cf6' };
  const MOOD_LABELS = { 1: 'ужасно', 2: 'плохо', 3: 'нормально', 4: 'хорошо', 5: 'отлично' };
  const STORAGE_KEY = 'moodtracker';

  const QUOTES = [
    'каждый день — это новая возможность',
    'даже маленький шаг — это прогресс',
    'твоё настроение — твой выбор',
    'будь добрее к себе',
    'ты уже справляешься лучше, чем думаешь',
    'сегодня будет хороший день',
    'сделай что-то, что сделает тебя счастливее',
    'не забывай дышать',
    'ты важен',
    'даже в плохой день есть что-то хорошее',
    'всё будет, но не сразу',
    'главное — не останавливаться',
    'позволь себе чувствовать',
    'ты сильнее, чем кажется',
    'каждая туча — с серебряной подкладкой',
    'не сравнивай себя с другими',
    'сегодня — отличный день, чтобы начать',
    'будь собой',
    'всё, что тебе нужно, уже есть внутри',
    'ты заслуживаешь счастья',
    'это тоже пройдёт',
    'держи голову выше',
    'маленькие победы — тоже победы',
    'никогда не поздно',
    'ты не один',
    'сделай глубокий вдох',
    'улыбнись, даже если не хочется',
    'ты справишься',
    'будь здесь и сейчас',
    'всему своё время',
  ];

  function getDailyQuote() {
    const today = new Date().toISOString().slice(0, 10);
    const dayNum = parseInt(today.replace(/-/g, ''), 10);
    return QUOTES[dayNum % QUOTES.length];
  }

  let selectedMood = null;

  // init
  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedMood = parseInt(btn.dataset.mood);
    });
  });

  document.getElementById('saveBtn').addEventListener('click', saveMood);

  function saveMood() {
    if (!selectedMood) return;
    const note = document.getElementById('note').value.trim();
    const today = new Date().toISOString().slice(0, 10);
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    data[today] = { mood: selectedMood, note };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    showToast();
    renderChart();
    renderStats();
    renderHistory();
    // reset
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('note').value = '';
    selectedMood = null;
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function renderChart() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const chart = document.getElementById('chart');
    const empty = document.getElementById('emptyState');
    chart.innerHTML = '';

    const days = [];
    const now = new Date();
    for (let i = 29; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      days.push(d.toISOString().slice(0, 10));
    }

    let hasData = false;
    for (const date of days) {
      const div = document.createElement('div');
      div.className = 'day';

      const entry = data[date];
      if (entry) {
        hasData = true;
        const mood = entry.mood;
        div.style.setProperty('--h', (mood * 10 + 10) + 'px');
        div.style.background = MOOD_COLORS[mood];

        const dayLabel = new Date(date).toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'short' });
        div.title = `${dayLabel} — ${MOOD_LABELS[mood]}${entry.note ? ': ' + entry.note : ''}`;
      } else {
        div.classList.add('empty');
      }
      chart.appendChild(div);
    }

    empty.style.display = hasData ? 'none' : 'block';
  }

  function renderStats() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const entries = Object.entries(data).sort((a, b) => a[0].localeCompare(b[0]));
    const stats = document.getElementById('stats');

    if (entries.length === 0) { stats.style.display = 'none'; return; }
    stats.style.display = 'block';

    const values = entries.map(([_, v]) => v.mood);

    // avg 7 days
    const last7 = values.slice(-7);
    const avg7 = last7.reduce((a, b) => a + b, 0) / last7.length;
    document.getElementById('avg7').textContent = avg7.toFixed(1) + ' (' + MOOD_LABELS[Math.round(avg7)] + ')';

    // avg all
    const avgAll = values.reduce((a, b) => a + b, 0) / values.length;
    document.getElementById('avgAll').textContent = avgAll.toFixed(1) + ' (' + MOOD_LABELS[Math.round(avgAll)] + ')';

    // best day of week
    const dayScores = {};
    for (const [date, v] of entries) {
      const d = new Date(date + 'T12:00:00');
      const day = d.toLocaleDateString('ru-RU', { weekday: 'long' });
      if (!dayScores[day]) dayScores[day] = { sum: 0, count: 0 };
      dayScores[day].sum += v.mood;
      dayScores[day].count++;
    }
    let bestDayName = '—', bestDayAvg = 0;
    for (const [day, s] of Object.entries(dayScores)) {
      const avg = s.sum / s.count;
      if (avg > bestDayAvg) { bestDayAvg = avg; bestDayName = day; }
    }
    document.getElementById('bestDay').textContent = bestDayName;

    // streak
    let streak = 0;
    const todayStr = new Date().toISOString().slice(0, 10);
    for (let i = 0; ; i++) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      if (data[key]) streak++; else break;
    }
    document.getElementById('streak').textContent = streak;

    // top mood
    const freq = {};
    for (const v of values) freq[v] = (freq[v] || 0) + 1;
    let topMood = 3, topCount = 0;
    for (const [m, c] of Object.entries(freq)) {
      if (c > topCount) { topCount = c; topMood = parseInt(m); }
    }
    const topEmojis = { 1: '😡', 2: '😢', 3: '😐', 4: '😊', 5: '🤩' };
    document.getElementById('topMood').textContent = topEmojis[topMood] + ' ' + MOOD_LABELS[topMood];

    // total
    document.getElementById('totalCount').textContent = entries.length;

    // distribution
    const distEl = document.getElementById('distribution');
    distEl.innerHTML = '';
    for (let m = 1; m <= 5; m++) {
      const count = freq[m] || 0;
      const pct = entries.length ? (count / entries.length * 100) : 0;
      const wrap = document.createElement('div');
      wrap.className = 'dist-bar-wrap';
      const emoji = document.createElement('div');
      emoji.className = 'dist-emoji';
      const topEmojis = { 1: '😡', 2: '😢', 3: '😐', 4: '😊', 5: '🤩' };
      emoji.textContent = topEmojis[m];
      const bar = document.createElement('div');
      bar.className = 'dist-bar';
      bar.style.background = MOOD_COLORS[m];
      bar.style.height = Math.max(4, pct * 1.5) + 'px';
      const countEl = document.createElement('div');
      countEl.className = 'dist-count';
      countEl.textContent = count;
      wrap.appendChild(emoji);
      wrap.appendChild(bar);
      wrap.appendChild(countEl);
      distEl.appendChild(wrap);
    }
  }

  function renderHistory() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const entries = Object.entries(data).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 20);
    const history = document.getElementById('history');
    const container = document.getElementById('entries');

    if (entries.length === 0) { history.style.display = 'none'; return; }
    history.style.display = 'block';
    container.innerHTML = '';

    const emojis = { 1: '😡', 2: '😢', 3: '😐', 4: '😊', 5: '🤩' };
    for (const [date, entry] of entries) {
      const div = document.createElement('div');
      div.className = 'entry';

      const dateDiv = document.createElement('div');
      dateDiv.className = 'entry-date';
      dateDiv.textContent = new Date(date + 'T12:00:00').toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });

      const moodDiv = document.createElement('div');
      moodDiv.className = 'entry-mood';
      moodDiv.textContent = emojis[entry.mood];

      const labelDiv = document.createElement('div');
      labelDiv.className = 'entry-label';
      labelDiv.textContent = MOOD_LABELS[entry.mood];

      const noteDiv = document.createElement('div');
      noteDiv.className = 'entry-note';
      noteDiv.textContent = entry.note || '—';

      const delBtn = document.createElement('button');
      delBtn.className = 'entry-del';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', () => {
        delete data[date];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        renderChart();
        renderStats();
        renderHistory();
      });

      div.appendChild(dateDiv);
      div.appendChild(moodDiv);
      div.appendChild(labelDiv);
      div.appendChild(noteDiv);
      div.appendChild(delBtn);
      container.appendChild(div);
    }
  }

  function showDailyQuote() {
    document.getElementById('quote').textContent = getDailyQuote();
  }

  showDailyQuote();
  renderChart();
  renderStats();
  renderHistory();
</script>
</body>
</html>
